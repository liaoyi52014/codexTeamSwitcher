# Codex Team Switcher Configuration Example
# Copy this file to config.yaml and fill in your team details

# Application settings
app:
  # Flask proxy server host
  proxy_host: "127.0.0.1"
  # Flask proxy server port
  proxy_port: 18888
  # Log level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"

# Database settings
database:
  # SQLite database file path
  db_path: "./data/teams.db"

# Team configuration
# 留空时，系统首次启动会自动从 ~/.codex/auth.json 导入当前登录账户
teams: []

# Monitor settings
monitor:
  # Quota percentage threshold to trigger switch (default: 5.0)
  threshold_percentage: 5.0
  # Check interval in seconds (default: 300 = 5 minutes)
  check_interval_seconds: 300
  # Enable automatic switching (default: true)
  auto_switch_enabled: true
  # Number of retry attempts on failure (default: 3)
  retry_attempts: 3
  # Retry delay in seconds (default: 5)
  retry_delay_seconds: 5

# Security settings
security:
  # Encryption key for tokens (32 bytes, base64 encoded)
  # Generate with: python -c "import base64; print(base64.b64encode(os.urandom(32)).decode())"
  encryption_key: ""
  # Environment variable for sensitive data
  env_prefix: "CODEX_"
