# Codex Team Switcher Configuration Example
# Copy this file to config.yaml and fill in your team details

# Application settings
app:
  # Flask proxy server host
  proxy_host: "127.0.0.1"
  # Flask proxy server port
  proxy_port: 18888
  # Log level: DEBUG, INFO, WARNING, ERROR
  log_level: "INFO"

# Database settings
database:
  # SQLite database file path
  db_path: "./data/teams.db"

# Team configuration
teams:
  # Add your teams here
  - id: "team-001"
    name: "Team Alpha"
    enabled: true
    priority: 1
    # Set to true to automatically load token from ~/.codex/auth.json
    use_codex_auth: false
    oauth:
      # Access token (will be encrypted when stored)
      # Only used if use_codex_auth is false
      access_token: "sk-your-token-here"
      # Refresh token (optional)
      refresh_token: ""
      # Token expiration time (ISO 8601 format)
      expires_at: ""
      # Organization ID (optional)
      organization_id: ""
    # Custom status command (optional, defaults to /status)
    status_command: "/status"

  - id: "team-002"
    name: "Team Beta"
    enabled: true
    priority: 2
    use_codex_auth: false
    oauth:
      access_token: "sk-your-token-here"
      refresh_token: ""
      expires_at: ""
      organization_id: ""

# Monitor settings
monitor:
  # Quota percentage threshold to trigger switch (default: 5.0)
  threshold_percentage: 5.0
  # Check interval in seconds (default: 300 = 5 minutes)
  check_interval_seconds: 300
  # Enable automatic switching (default: true)
  auto_switch_enabled: true
  # Number of retry attempts on failure (default: 3)
  retry_attempts: 3
  # Retry delay in seconds (default: 5)
  retry_delay_seconds: 5

# Security settings
security:
  # Encryption key for tokens (32 bytes, base64 encoded)
  # Generate with: python -c "import base64; print(base64.b64encode(os.urandom(32)).decode())"
  encryption_key: ""
  # Environment variable for sensitive data
  env_prefix: "CODEX_"
